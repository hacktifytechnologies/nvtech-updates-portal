version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=portal_pass_2024
      - DB_NAME=nvtech_updates
    volumes:
      - ./app:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nvtech-network

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=portal_pass_2024
      - MYSQL_DATABASE=nvtech_updates
    ports:
      - "33060:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pportal_pass_2024"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nvtech-network

networks:
  nvtech-network:
    driver: bridge
